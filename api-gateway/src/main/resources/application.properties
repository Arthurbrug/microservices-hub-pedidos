spring.application.name=api-gateway

server.port=8082

# config do Eureka Client (do Gateway)
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Endereńo do Eureka Server (defaultZone ķ camelCase)
# localhost 8761, onde o Eureka Server estß recebendo as requisiń§es
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Spring Discovery Locator (rotas dinŌmicas via Eureka)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

# Converte o ID dos servińos registrados no Eureka
# para min·sculas ao criar rotas dinŌmicas
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true